<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1c1917;
        color: #f5f1ea;
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        -webkit-app-region: drag;
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: #d97706;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 6px;
      }
      p {
        font-size: 12px;
        color: rgba(245, 241, 234, 0.6);
        margin: 0;
      }
      .spinner {
        margin-top: 18px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 3px solid rgba(245, 241, 234, 0.2);
        border-top-color: #d97706;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="mark">🧑‍🍳</div>
    <h1>مدينة الشاورما</h1>
    <p>جارٍ التشغيل...</p>
    <div class="spinner"></div>
  </body>
</html>
