version: "3.9"

name: restaurant-erp-pro

services:

  postgres:
    image: postgres:17
    container_name: restaurant_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: restaurant_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: restaurant_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

  backend:

    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: restaurant_backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    environment:

      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/restaurant_erp

      REDIS_URL: redis://redis:6379/0

    volumes:

      - ./backend:/workspace

  frontend:

    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: restaurant_frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      VITE_API_PROXY_TARGET: http://backend:8000

  pgadmin:

    image: dpage/pgadmin4

    container_name: restaurant_pgadmin

    restart: unless-stopped

    depends_on:
      - postgres

    environment:

      PGADMIN_DEFAULT_EMAIL: admin@restauranterp.com

      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:

  postgres_data:

  redis_data:

  pgadmin_data:
